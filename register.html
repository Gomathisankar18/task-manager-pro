<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<link rel="stylesheet" href="style.css">

<style>

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.register-card{
width:400px;
padding:30px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border-radius:20px;
}

.register-card h1{
text-align:center;
margin-bottom:20px;
}

.register-card input{
width:100%;
margin-bottom:15px;
padding:12px;
border:none;
border-radius:10px;
}

.register-card button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#06b6d4;
color:white;
cursor:pointer;
}

.link{
text-align:center;
margin-top:15px;
}

.link a{
color:#06b6d4;
text-decoration:none;
font-weight:bold;
}

#message{
margin-top:15px;
text-align:center;
font-weight:bold;
font-size:16px;
}

.success{
color:#22c55e;
}

.error{
color:#ef4444;
}

</style>

</head>

<body>

<div class="register-card">

<h1>Create Account</h1>

<input
type="text"
id="username"
placeholder="Username">

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="registerUser()">
Register
</button>

<p id="message"></p>

<div class="link">
Already have an account?
<a href="login.html">Login Here</a>
</div>

</div>

<script>

async function registerUser(){

const username =
document.getElementById("username").value;

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

const message =
document.getElementById("message");

try{

const response =
await fetch(
"http://localhost:5000/register",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
username,
email,
password
})
}
);

const data =
await response.text();

if(data === "Registration Successful"){

message.className = "success";
message.innerText =
"✅ Registration Successful! Redirecting to Login...";

setTimeout(()=>{
window.location.href =
"login.html";
},1500);

}
else{

message.className = "error";
message.innerText = "❌ " + data;

}

}
catch(error){

message.className = "error";
message.innerText =
"❌ Server Connection Failed";

}

}

</script>

</body>
</html>
