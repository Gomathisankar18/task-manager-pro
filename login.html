<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link rel="stylesheet" href="style.css">

<style>

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-card{
width:400px;
padding:30px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border-radius:20px;
}

.login-card h1{
text-align:center;
margin-bottom:20px;
}

.login-card input{
width:100%;
padding:12px;
margin-bottom:15px;
border:none;
border-radius:10px;
}

.login-card button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#06b6d4;
color:white;
cursor:pointer;
}

.link{
text-align:center;
margin-top:15px;
}

.link a{
color:#06b6d4;
text-decoration:none;
font-weight:bold;
}

</style>

</head>

<body>

<div class="login-card">

<h1>Login</h1>

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="loginUser()">
Login
</button>

<div class="link">
New User?
<a href="register.html">Register Here</a>
</div>

</div>

<script>

async function loginUser(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

const response =
await fetch(
"http://localhost:5000/login",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email,
password
})
}
);

const data =
await response.text();

if(data === "Login Successful"){

alert("Login Successful");

localStorage.setItem(
"loggedIn",
"true"
);

window.location.href =
"index.html";

}
else{

document.getElementById("message").innerText = data;

}

}

</script>

</body>
</html>
